<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Larder — cook what's on your shelves</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  /* warm cream-linen ground — food reads appetizing on warm neutrals, never clinical white or blue */
  --paper:#FBF7EF; --ink:#23271F; --muted:#5A5F57; --line:#EAE3D3; --card:#FFFDF9;
  --oat:#F4EFE2; --tag-bg:#F1ECDE; --title:#2A6242;
  /* health anchors — fresh produce greens */
  --herb:#3A7D52; --leaf:#4F9D4E;
  /* appetite triggers — warm reds/oranges/golds */
  --saffron:#E0A21B; --roast:#A83E38; --tomato:#D6482B;
  --tab-accent:var(--herb); --on-accent:#fff; --accent-ink:var(--herb);
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --disp:"Fraunces",Georgia,serif;
  --body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
body{line-height:1.5}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
::selection{background:#E4EBD8}

.app{max-width:940px;margin:0 auto;padding:20px 18px 64px}

/* masthead */
.masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding-bottom:16px;border-bottom:1.5px solid var(--ink)}
.brand{display:flex;align-items:center;gap:12px}
.mark{font-size:30px;line-height:1;color:var(--tomato);transform:translateY(1px)}
.masthead h1{font-family:var(--disp);font-weight:600;font-size:34px;letter-spacing:-.01em;margin:0;color:var(--title)}
.tagline{margin:2px 0 0;font-size:13px;color:var(--muted);font-style:italic;font-family:var(--disp)}
.pantry-count{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:right}
.pantry-count span{display:inline-block;color:var(--herb);font-size:16px}
.mast-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.keyring-btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--card);border:1.4px solid var(--line);border-radius:8px;padding:6px 11px}
.keyring-btn:hover{border-color:var(--herb)}
.keyring-btn.active{border-color:var(--herb)}
.keyring-dot{width:8px;height:8px;border-radius:50%;background:var(--line)}
.keyring-btn.active .keyring-dot{background:var(--leaf)}
.link-btn{background:none;border:none;padding:0;color:var(--accent-ink);font:inherit;font-weight:600;text-decoration:underline;cursor:pointer}
.keyring-intro{font-size:13px;color:var(--ink);margin:0 0 8px}
.keyring-warn{font-size:12px;color:var(--roast);background:#FBEEE9;border:1px solid #F0D8CF;border-radius:8px;padding:9px 11px;margin:0 0 14px}
.key-add{display:flex;flex-direction:column;gap:8px}
.key-list{display:flex;flex-direction:column;gap:8px;margin:14px 0}
.key-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.4px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--card)}
.key-item.on{border-color:var(--herb);background:#F1F6F1}
.key-pick{display:flex;align-items:center;gap:9px;font-size:13px;cursor:pointer;flex:1;min-width:0}
.key-label{font-weight:600}
.key-mask{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.key-remove{background:none;border:none;color:var(--roast);font-size:12.5px;font-weight:600;cursor:pointer}
.key-actions{display:flex;align-items:center;gap:12px;margin:6px 0 14px;font-size:13px}
.remember-row{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--ink);border-top:1px solid var(--line);padding-top:14px}
.remember-row .hint{display:inline}

/* tabs */
.tabs{display:flex;gap:2px;margin:18px 0 22px;flex-wrap:wrap}
.tab{border:none;background:transparent;padding:9px 15px 12px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;transition:color .15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--tab-accent)}
.tab:focus-visible{outline:2px solid var(--herb);outline-offset:2px;border-radius:3px}

/* panel */
.panel{--tab-accent:var(--herb)}
.panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}
.panel-head h2{font-family:var(--disp);font-weight:600;font-size:25px;margin:0;color:var(--accent-ink)}
.sub{margin:4px 0 0;color:var(--muted);font-size:13.5px;max-width:52ch}

/* buttons */
.btn-solid{background:var(--tab-accent);color:var(--on-accent);border:none;border-radius:8px;padding:10px 16px;font-weight:600;font-size:14px}
.btn-solid:disabled{opacity:.55}
.btn-solid.full{width:100%;margin-top:10px}
.btn-ghost{background:transparent;border:1.5px solid var(--line);border-radius:8px;padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--ink)}
.btn-ghost:hover{border-color:var(--ink)}

/* pantry add */
.add-row{display:flex;gap:8px;margin-bottom:20px}
.add-input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:11px 13px;font-size:15px;background:#fff}
.add-input:focus{outline:none;border-color:var(--herb)}

/* chips = pantry labels */
.on-hand{background:var(--oat);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:22px}
.shelf-label,.cat-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:9px}
.cat{margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:var(--mono);font-size:12px;letter-spacing:.01em;background:#fff;border:1.4px solid var(--line);color:#40453d;border-radius:6px;padding:6px 10px;transition:all .12s}
.chip:hover{border-color:var(--herb)}
.chip-on{background:var(--tab-accent);border-color:var(--tab-accent);color:var(--on-accent)}
.chip .x{margin-left:6px;opacity:.75;font-family:var(--body)}
.foot-note{font-size:12.5px;color:var(--muted);margin-top:8px}

/* controls */
.controls{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;background:var(--oat);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
.ctrl{display:flex;flex-direction:column;gap:7px}
.ctrl.grow{margin-left:auto;flex-direction:row;align-items:center;gap:8px}
.ctrl-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.hint{font-size:11.5px;color:var(--muted)}
.seg{display:inline-flex;background:#fff;border:1.4px solid var(--line);border-radius:8px;padding:3px;gap:2px}
.seg.small{align-self:flex-start}
.seg-btn{border:none;background:transparent;border-radius:6px;padding:7px 14px;font-size:13.5px;font-weight:600;color:var(--muted)}
.seg-btn.on{background:var(--tab-accent);color:var(--on-accent)}
.toggle{display:inline-flex;background:#fff;border:1.4px solid var(--line);border-radius:8px;padding:3px;font-size:13px;font-weight:600}
.toggle span{padding:6px 12px;border-radius:6px;color:var(--muted)}
.toggle span.on{background:var(--tab-accent);color:var(--on-accent)}

.status{font-size:13px;color:var(--muted);margin:2px 0 12px}
.research-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 16px}
.btn-research{background:var(--card);border:1.5px solid var(--tab-accent);color:var(--accent-ink);border-radius:8px;padding:9px 15px;font-weight:600;font-size:13.5px}
.btn-research:hover{background:var(--tab-accent);color:var(--on-accent)}
.btn-research:disabled{opacity:.55}
.research-note{font-size:12px;color:var(--muted);max-width:44ch}
.err{font-size:13.5px;color:var(--roast);margin:4px 0 12px}
.err::before{content:"\2715  ";font-weight:800}
.ok{font-size:13.5px;color:var(--herb);margin:8px 0 0;font-weight:600}
.ok::before{content:"\2713  ";font-weight:800}
.empty{border:1.5px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);font-size:14px}

/* cards */
.cards{display:flex;flex-direction:column;gap:14px}
.card{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(30,25,20,.03)}
.spine{width:6px;background:var(--tab-accent);flex:none}
.card-body{padding:16px 18px;flex:1;min-width:0}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card h3{font-family:var(--disp);font-weight:600;font-size:19px;margin:0 0 5px}
.meta{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--muted);align-items:center}
.tag{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;background:var(--tag-bg);color:#5a5f54;padding:3px 7px;border-radius:5px}
.kcal{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.02em;color:var(--accent-ink);background:var(--oat);border:1px solid var(--line);padding:2px 7px;border-radius:5px}
.cal-note{font-size:11.5px;color:var(--muted);font-style:italic;margin:12px 0 0}
.flavor{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.02em;color:var(--roast);background:#FBEEE9;border:1px solid #F0D8CF;padding:2px 7px;border-radius:5px;text-transform:lowercase}
.chef-blurb{font-family:var(--disp);font-style:italic;font-size:14.5px;line-height:1.5;color:var(--ink);margin:12px 0 0;padding:12px 14px;background:var(--oat);border-left:3px solid var(--tab-accent);border-radius:0 8px 8px 0}
.chef-name{display:block;font-family:var(--mono);font-style:normal;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent-ink);margin-bottom:5px}
.chef-key{border:1.6px solid var(--herb);background:linear-gradient(180deg,#F1F6F1,#FBF7EF);border-radius:14px;padding:16px 18px;margin-bottom:22px}
.chef-key.connected{border-color:var(--line);background:var(--oat)}
.chef-key-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.chef-key-title{font-family:var(--disp);font-weight:600;font-size:19px;color:var(--title)}
.chef-key-note{font-size:13px;color:var(--ink);margin:5px 0 0;max-width:62ch}
.chef-badge{flex:none;font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;border-radius:6px;background:var(--herb);color:#fff}
.chef-key.connected .chef-badge{background:var(--leaf);color:#1E2419}
.chef-key-add{display:flex;gap:8px;align-items:center;margin:14px 0 10px;flex-wrap:wrap}
.chef-key-add .add-input{flex:1;min-width:200px}
.chef-key-fine{font-size:11.5px;color:var(--muted);margin:0}
.pdf-btn{flex:none;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.03em;background:transparent;border:1.4px solid var(--line);border-radius:7px;padding:7px 11px;color:var(--ink)}
.pdf-btn:hover{border-color:var(--accent-ink);color:var(--accent-ink)}
.tobuy{margin-top:11px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.buy-chip{font-family:var(--mono);font-size:11px;background:#FBEEDD;color:#8a6a1a;border-radius:5px;padding:3px 7px}
.reveal{margin-top:12px;background:transparent;border:none;color:var(--accent-ink);font-weight:600;font-size:13px;padding:0}
.reveal:hover{text-decoration:underline}
.recipe{display:grid;grid-template-columns:1fr 1.3fr;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.recipe h4{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 8px}
.recipe ul,.recipe ol{margin:0;padding-left:18px}
.recipe li{font-size:13.5px;margin-bottom:5px}
.recipe li.miss{color:#8a6a1a}

/* modal */
.modal-scrim{position:fixed;inset:0;background:rgba(30,26,20,.42);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:440px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h3{font-family:var(--disp);font-weight:600;font-size:20px;margin:0}
.x-btn{background:transparent;border:none;font-size:24px;line-height:1;color:var(--muted)}
.paste-area{width:100%;min-height:120px;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-size:14px;font-family:var(--body);resize:vertical;background:#fff}
.paste-area:focus{outline:none;border-color:var(--herb)}
.drop{text-align:center;border:1.5px dashed var(--line);border-radius:12px;padding:22px 16px}
.drop p{font-size:13px;color:var(--muted);margin:0 0 14px}

/* sources */
.sources{margin-top:44px;padding-top:22px;border-top:1.5px solid var(--ink)}
.sources h2{font-family:var(--disp);font-weight:600;font-size:20px;margin:0 0 6px}
.src-note{font-size:12.5px;color:var(--muted);max-width:64ch;margin:0 0 16px}
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.src-head{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--herb);margin-bottom:9px}
.src-list{display:flex;flex-direction:column;gap:6px}
.src-list a{font-size:13.5px;text-decoration:none;color:var(--ink);width:fit-content;border-bottom:1px solid transparent}
.src-list a:hover{border-bottom-color:var(--herb)}

@media (max-width:620px){
  .masthead h1{font-size:28px}
  .recipe{grid-template-columns:1fr}
  .src-grid{grid-template-columns:1fr}
  .controls{gap:14px}
  .ctrl.grow{margin-left:0;width:100%}
  .ctrl.grow .btn-solid{flex:1}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   LARDER — cook what's on your shelves
   Hybrid recipe engine: curated library first, live AI fills gaps,
   everything screened through a dietary-safety filter.
   ============================================================ */

/* ---------- Sources (13 total: 8 plant-based, 5 universal) ---------- */
const SOURCES = [
  { name: "Minimalist Baker", url: "https://minimalistbaker.com", kind: "plant" },
  { name: "Oh She Glows", url: "https://ohsheglows.com", kind: "plant" },

  { name: "The Full Helping", url: "https://www.thefullhelping.com", kind: "plant" },

const SOURCE_NAMES = SOURCES.map((s) => s.name);

/* ---------- Common pantry catalogue ---------- */
const PANTRY_CATALOGUE = [
  { group: "Grains & starch", items: ["rice", "pasta", "bread", "flour", "oats", "quinoa", "couscous", "tortillas", "breadcrumbs", "noodles"] },
  { group: "Legumes & proteins", items: ["black beans", "chickpeas", "lentils", "kidney beans", "white beans", "tofu", "tempeh", "peanut butter", "peas", "canned tuna", "eggs"] },
  { group: "Vegetables", items: ["onion", "garlic", "carrots", "celery", "tomatoes", "spinach", "bell pepper", "broccoli", "mushrooms", "zucchini", "potatoes", "sweet potato", "kale", "cauliflower"] },

const STAPLES = ["salt", "pepper", "water", "oil", "olive oil"]; // assumed always on hand

/* ---------- Curated recipe library ---------- */
const LIBRARY = [
  // VEGAN
  { id: "v1", diet: "vegan", title: "Chickpea & Spinach Coconut Curry", style: "Rainbow Plant Life", servings: 4, time: 30,
    key: ["chickpeas", "spinach", "coconut milk", "onion", "garlic", "curry powder", "rice"],
    display: ["1 onion, diced", "3 garlic cloves, minced", "2 tbsp curry powder", "1 can chickpeas, drained", "1 can coconut milk", "3 cups spinach", "cooked rice, to serve"],

    display: ["200g noodles", "3 tbsp peanut butter", "2 tbsp soy sauce", "1 lime, juiced", "2 garlic cloves", "1 bell pepper, sliced"],

    display: ["1 cup quinoa", "1 sweet potato, cubed", "1 head broccoli", "1 can chickpeas", "olive oil", "1 lemon"],

/* ============================================================
   DIETARY SAFETY FILTER  (highest-importance requirement)
   Classifies each ingredient, then a recipe passes only if
   every ingredient is permitted for the tab. Errs toward
   rejection so a forbidden item is never shown.
   ============================================================ */
const PLANT_QUALIFIERS = ["almond", "oat", "soy", "soya", "coconut", "rice", "cashew", "hemp", "plant", "vegan", "nut", "peanut", "sun", "seed", "cocoa", "apple", "pumpkin", "walnut", "hazelnut", "macadamia", "flax", "chia", "just", "dairy-free", "dairyfree", "non-dairy", "nondairy", "tofu", "veggie", "impossible", "beyond", "mock", "faux", "mushroom"];

const TERMS = {
  meatfish: ["beef", "steak", "pork", "bacon", "ham", "sausage", "pepperoni", "prosciutto", "pancetta", "chorizo", "salami", "chicken", "turkey", "duck", "lamb", "veal", "goat", "bison", "venison", "meatball", "meatballs", "meat", "mince", "salmon", "tuna", "cod", "tilapia", "halibut", "trout", "sardine", "anchovy", "mackerel", "shrimp", "prawn", "crab", "lobster", "scallop", "oyster", "clam", "mussel", "squid", "calamari", "octopus", "fish", "seafood", "caviar", "roe", "lard", "tallow", "suet", "fish sauce", "oyster sauce", "worcestershire", "bone broth", "chicken broth", "beef broth", "chicken stock", "beef stock"],
  gelatin: ["gelatin", "gelatine"],
  egg: ["egg", "eggs", "egg white", "egg yolk", "mayonnaise", "mayo", "aioli", "meringue"],
  cheese: ["cheese", "cheddar", "mozzarella", "parmesan", "parmigiano", "feta", "ricotta", "mascarpone", "gouda", "brie", "paneer", "halloumi", "cotija", "gruyere", "gruyère", "pecorino", "queso"],
  yogurt: ["yogurt", "yoghurt", "kefir"],
  butter: ["butter", "ghee"],
  otherdairy: ["milk", "cream", "buttermilk", "half and half", "sour cream", "heavy cream", "whipping cream", "condensed milk", "evaporated milk", "whey", "casein", "custard", "clotted cream", "creme fraiche", "crème fraîche"],
  honey: ["honey"],
};

function hasWord(text, term) {
  if (term.indexOf(" ") !== -1) return text.indexOf(term) !== -1; // multiword: substring
  const re = new RegExp("(^|[^a-z])" + term + "([^a-z]|$)");
  return re.test(text);
}
function hasPlantQualifier(text) {
  return PLANT_QUALIFIERS.some((q) => text.indexOf(q) !== -1);
}

/* returns one of: plant | meatfish | egg | cheese | yogurt | butter | otherdairy | honey | gelatin */
function classifyIngredient(raw) {
  let t = (" " + String(raw).toLowerCase() + " ").replace(/[,.;()/]/g, " ");
  // hard exclusions of vegetable homonyms
  const eggplant = t.indexOf("eggplant") !== -1;
  const plantQ = hasPlantQualifier(t);
  const creamOfTartar = t.indexOf("cream of tartar") !== -1;

  // meat / fish
  if (TERMS.meatfish.some((w) => hasWord(t, w))) {
    if (!plantQ) return "meatfish";
  }
  if (TERMS.gelatin.some((w) => hasWord(t, w))) return "gelatin";
  // egg (guard eggplant)
  if (!eggplant && TERMS.egg.some((w) => hasWord(t, w))) {
    if (!plantQ) return "egg";
  }
  // dairy families
  if (TERMS.cheese.some((w) => hasWord(t, w)) && !plantQ) return "cheese";
  if (TERMS.yogurt.some((w) => hasWord(t, w)) && !plantQ) return "yogurt";
  if (TERMS.butter.some((w) => hasWord(t, w)) && !plantQ) return "butter";
  if (!creamOfTartar && TERMS.otherdairy.some((w) => hasWord(t, w)) && !plantQ) return "otherdairy";
  if (TERMS.honey.some((w) => hasWord(t, w)) && !plantQ) return "honey";
  return "plant";
}

function recipeAllowedFor(diet, ingredientNames) {
  const cats = ingredientNames.map(classifyIngredient);
  if (diet === "vegan") return cats.every((c) => c === "plant");
  if (diet === "vegetarian") return cats.every((c) => c === "plant" || c === "cheese" || c === "yogurt" || c === "butter");
  return true; // omnivore
}

/* ---------- Pantry matching ---------- */
function normName(s) { return String(s).toLowerCase().trim(); }
function isStaple(k) { return STAPLES.some((s) => normName(k).indexOf(s) !== -1 || s.indexOf(normName(k)) !== -1); }
function pantryHas(pantry, k) {
  const key = normName(k);
  return pantry.some((p) => {
    const pn = normName(p);
    return pn === key || pn.indexOf(key) !== -1 || key.indexOf(pn) !== -1;
  });
}
function missingFor(recipe, pantry) {
  return recipe.key.filter((k) => !isStaple(k) && !pantryHas(pantry, k));
}

  "turkey":170,"ground turkey":170,"basil":23,"parsley":36,"cilantro":23,"ginger":80

/* grams for one countable unit, by food (substring keyed) */
var COUNT_G = {
  "onion":150,"garlic":5,"carrot":60,"celery":40,"tomato":120,"bell pepper":150,
  "potato":170,"sweet potato":200,"lemon":100,"lime":67,"apple":180,"banana":118,

  "bread":30,"broccoli":400,"cauliflower":500,"eggplant":300,"chicken":170,"mushroom":20,
  "pepper":150
};
/* grams for one "can", by food */
var CAN_G = { "chickpeas":240,"black beans":150,"kidney beans":150,"white beans":150,"beans":150,
  "tomatoes":400,"tomato":400,"coconut milk":400,"corn":150,"tuna":145,"olives":120 };
/* grams per US cup, by food (more reliable than a blanket density) */
var CUP_G = {
  "rice":185,"pasta":100,"noodles":100,"quinoa":170,"couscous":175,"oats":90,"flour":125,
  "sugar":200,"breadcrumbs":108,"cheese":110,"spinach":30,"kale":40,"broccoli":90,
  "cauliflower":100,"peas":145,"corn":165,"mushrooms":70,"chickpeas":164,"black beans":172,
  "kidney beans":177,"white beans":179,"beans":175,"lentils":192,"yogurt":245,"cocoa powder":100,
  "olives":135
};
/* fallback density g/ml for volume when no CUP_G entry */
var DENSITY = { "oil":0.92,"sesame oil":0.92,"olive oil":0.92,"honey":1.42,"maple syrup":1.32,
  "soy sauce":1.1,"milk":1.03,"almond milk":1.03,"oat milk":1.03,"coconut milk":1.0,
  "peanut butter":1.05,"cream":1.0,"tomato paste":1.1 };

var MASS_G = { g:1, gram:1, grams:1, kg:1000, oz:28.35, lb:453.6, lbs:453.6, pound:453.6, pounds:453.6 };
var VOL_ML = { ml:1, l:1000, liter:1000, litre:1000, cup:240, cups:240, tbsp:15, tablespoon:15,
  tablespoons:15, tsp:5, teaspoon:5, teaspoons:5, "fl_oz":30 };
var UNIT_ALIAS = { g:"g",gram:"g",grams:"g",kg:"kg",oz:"oz",lb:"lb",lbs:"lb",pound:"lb",pounds:"lb",
  ml:"ml",l:"l",liter:"l",litre:"l",cup:"cup",cups:"cup",tbsp:"tbsp",tablespoon:"tbsp",
  tablespoons:"tbsp",tsp:"tsp",teaspoon:"tsp",teaspoons:"tsp",can:"can",cans:"can",clove:"clove",
  cloves:"clove",slice:"slice",slices:"slice",fillet:"fillet",fillets:"fillet",head:"head",
  handful:"handful",pinch:"pinch",bunch:"bunch",stalk:"stalk",stalks:"stalk" };

/* when a fat/condiment/spice/herb is listed with no amount, assume a small
   drizzle/sprinkle rather than a whole 100 g */
var SEASON_G = {
  "olive oil":14,"sesame oil":14,"vegetable oil":14,"oil":14,"butter":14,"ghee":14,
  "soy sauce":15,"vinegar":15,"honey":21,"maple syrup":20,"mustard":10,"hot sauce":6,
  "salsa":30,"tomato paste":30,"salt":1,"pepper":1,"cumin":3,"paprika":3,"curry powder":4,
  "oregano":2,"chili flakes":2,"cinnamon":3,"turmeric":3,"garlic powder":3,"cocoa powder":6,
  "basil":5,"parsley":4,"cilantro":4,"ginger":6
};

var PREP = /\b(diced|minced|chopped|sliced|drained|grated|cubed|to serve|to taste|torn|thinly|cooked|fresh|large|small|medium|red|green|ripe|of|for|garnish|optional|plus|extra)\b/g;

function dbLookup(map, food) {
  if (map[food] != null) return map[food];
  var best = null, bestLen = 0;
  for (var k in map) { if (food.indexOf(k) !== -1 && k.length > bestLen) { best = map[k]; bestLen = k.length; } }
  return best;
}

function parseIngredient(str) {
  var s = String(str).toLowerCase().replace(/[()]/g, " ").trim();
  var qty = null, hadQty = false;
  s = s.replace(/^(\d+(?:\.\d+)?)\s*[\u2013-]\s*\d+(?:\.\d+)?/, "$1"); // range -> first
  var mm = s.match(/^(\d+)\s+(\d+)\/(\d+)\b/);
  if (mm) { qty = (+mm[1]) + (+mm[2]) / (+mm[3]); s = s.slice(mm[0].length).trim(); hadQty = true; }
  else { var fr = s.match(/^(\d+)\/(\d+)\b/); if (fr) { qty = (+fr[1]) / (+fr[2]); s = s.slice(fr[0].length).trim(); hadQty = true; }
    else { var dc = s.match(/^(\d+(?:\.\d+)?)/); if (dc) { qty = +dc[1]; s = s.slice(dc[0].length).trim(); hadQty = true; } } }
  var unit = "count";
  var fw = s.match(/^([a-z]+)/);
  if (fw && UNIT_ALIAS[fw[1]]) { unit = UNIT_ALIAS[fw[1]]; s = s.slice(fw[1].length).trim(); }
  if (qty === null) { qty = 1; if (fw && ["handful", "pinch", "bunch"].indexOf(fw[1]) !== -1) unit = UNIT_ALIAS[fw[1]]; }
  var food = s.split(",")[0].replace(PREP, " ").replace(/\s+/g, " ").trim();
  return { qty: qty, unit: unit, food: food, hadQty: hadQty };
}

function ingredientGrams(p) {
  var f = p.food, u = p.unit, q = p.qty;
  if (MASS_G[u]) return q * MASS_G[u];
  if (VOL_ML[u]) {
    var cup = dbLookup(CUP_G, f);
    if (u === "cup" && cup != null) return q * cup;
    var dens = dbLookup(DENSITY, f); if (dens == null) dens = 0.6;
    if (u === "cup" && cup == null) return q * 240 * dens;
    return q * VOL_ML[u] * dens;
  }
  if (u === "can") { var cg = dbLookup(CAN_G, f); return q * (cg != null ? cg : 400); }
  if (u === "clove") return q * 5;
  if (u === "slice") return q * 25;
  if (u === "fillet") return q * 170;
  if (u === "head") return q * (dbLookup(COUNT_G, f) || 400);
  if (u === "handful") return q * 20;
  if (u === "pinch") return q * 0.5;
  if (u === "bunch") return q * 60;
  if (u === "stalk") return q * 40;
  // count
  if (!p.hadQty) { var sg = dbLookup(SEASON_G, f); if (sg != null) return q * sg; }
  var cw = dbLookup(COUNT_G, f);
  return q * (cw != null ? cw : 100);
}

/* ingredients: array of strings OR {name}. Returns rounded perServing/total + coverage. */
function estimateCalories(ingredients, servings) {
  servings = servings || 1;
  var total = 0, known = 0, count = 0;
  ingredients.forEach(function (ing) {
    var name = typeof ing === "string" ? ing : (ing.name || "");
    if (!name) return;
    count++;
    var p = parseIngredient(name);
    if (!p.food) return;
    var kcal100 = dbLookup(KCAL_100, p.food);
    if (kcal100 == null) return;            // unknown food -> not counted (flag via coverage)
    known++;
    var grams = ingredientGrams(p);
    total += grams / 100 * kcal100;
  });
  var perServing = total / servings;
  // sane clamp so a parse miss never shows something absurd
  perServing = Math.max(40, Math.min(1600, perServing));
  return {
    perServing: Math.round(perServing / 5) * 5,
    total: Math.round((perServing * servings) / 5) * 5,
    coverage: count ? known / count : 0
  };
}


/* ---------- Normalise any recipe into a common render shape ---------- */
function normalizeLibrary(r, pantry) {
  const missing = missingFor(r, pantry);
  const cal = estimateCalories(r.display, r.servings);
  return {
    id: r.id, source: r.researched ? "Saved" : "Library", title: r.title, style: r.style, servings: r.servings,
    time: r.time, ingredients: r.display.map((d) => ({ name: d, have: true })),
    steps: r.steps, missing, kcal: cal.perServing, kcalTotal: cal.total, kcalCoverage: cal.coverage,
    blurb: r.blurb || "", flavor: r.flavor || "",
  };
}

/* ============================================================
   AI GAP-FILLER  (single recipe per call; validated on return)
   ============================================================ */
function dietRuleText(diet) {
  if (diet === "vegan")
    return "The recipe must be 100% VEGAN. Absolutely NO animal products: no meat, poultry, fish, seafood, eggs, dairy (milk, cheese, butter, yogurt, cream, ghee), honey or gelatin. You MAY use plant-based substitutes such as tofu, tempeh, seitan, jackfruit, Impossible/Beyond, vegan cheese/butter, plant milks, aquafaba, lentils, chickpeas, falafel.";
  if (diet === "vegetarian")
    return "The recipe must be VEGETARIAN. The ONLY animal products allowed are cheese, yogurt and butter. Do NOT use meat, poultry, fish, seafood, eggs, milk, cream, ghee, honey or gelatin. Everything else must be plant-based.";
  return "The recipe should feature an animal protein (fish, red meat, poultry or lean meat). Any ingredients are allowed.";
}

/* When a user key is present (standalone deployments) attach the
   browser-CORS auth headers. Inside Claude.ai no key is needed — the
   keyless call is proxied. */
function anthropicHeaders(apiKey) {
  const h = { "Content-Type": "application/json" };
  if (apiKey) {
    h["x-api-key"] = apiKey;
    h["anthropic-version"] = "2023-06-01";
    h["anthropic-dangerous-direct-browser-access"] = "true";
  }
  return h;
}

async function generateOneRecipe({ diet, pantry, strict, avoid, apiKey }) {
  const modeText = strict
    ? "Use ONLY ingredients from the pantry list plus basic staples (salt, pepper, water, oil). Do not require anything not in the pantry."
    : "Prefer pantry ingredients. You may add up to 3 ingredients that are NOT in the pantry; mark those with have=false.";
  const prompt =
`You are Chef Boye R. Dee — a punchy, confident chef who builds recipes from whatever's in the pantry. Develop ONE recipe.

PANTRY: ${pantry.join(", ") || "(empty)"}

RULES:
- ${dietRuleText(diet)}
- ${modeText}
- Set "style" to one of these real sources: ${SOURCE_NAMES.join(", ")}.
- Avoid these titles: ${avoid.join("; ") || "none"}.
- "blurb": your description of the dish in your punchy chef voice — 4 to 5 short sentences MAX.
- "flavor": a brief flavor-profile estimate, e.g. "smoky, tangy, herby".
- Keep steps to 5 max and terse. Be concise to keep this small.

Respond with ONLY a JSON object, no markdown, in this shape:
{"title":"...","style":"Source name","servings":4,"time":30,"flavor":"...","blurb":"...","ingredients":[{"name":"1 onion, diced","have":true}],"steps":["...","..."]}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: anthropicHeaders(apiKey),
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) throw new Error("Recipe service unavailable (" + res.status + ")");
  const data = await res.json();
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  let clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const start = clean.indexOf("{"); const end = clean.lastIndexOf("}");
  if (start !== -1 && end !== -1) clean = clean.slice(start, end + 1);
  let obj;
  try { obj = JSON.parse(clean); } catch (e) { return null; }
  if (!obj || !Array.isArray(obj.ingredients) || !Array.isArray(obj.steps)) return null;

  // SAFETY re-check on the model output
  const names = obj.ingredients.map((i) => i.name || "");
  if (!recipeAllowedFor(diet, names)) return null;

  const missing = obj.ingredients.filter((i) => i.have === false).map((i) => i.name);
  const cal = estimateCalories(obj.ingredients.map((i) => i.name), obj.servings || 4);
  return {
    id: "ai-" + Math.random().toString(36).slice(2, 9),
    source: "AI", title: obj.title || "Recipe", style: obj.style || "AI",
    servings: obj.servings || 4, time: obj.time || 30,
    blurb: obj.blurb || "", flavor: obj.flavor || "",
    ingredients: obj.ingredients.map((i) => ({ name: i.name, have: i.have !== false })),
    steps: obj.steps, missing, kcal: cal.perServing, kcalTotal: cal.total, kcalCoverage: cal.coverage,
  };
}

/* ============================================================
   PDF EXPORT (jsPDF)
   ============================================================ */
function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""); }
function downloadPdf(r) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const M = 56, W = 595 - M * 2; let y = 64;
  doc.setFont("times", "bold"); doc.setFontSize(22);
  doc.text(doc.splitTextToSize(r.title, W), M, y); y += 30;
  doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(110);
  doc.text(`Inspired by ${r.style}  ·  Serves ${r.servings}  ·  ${r.time} min  ·  ~${r.kcal} kcal/serving`, M, y); y += 18;
  if (r.flavor) { doc.setFont("helvetica", "italic"); doc.text(doc.splitTextToSize("Flavor: " + r.flavor, W), M, y); y += 16; doc.setFont("helvetica", "normal"); }
  if (r.blurb) { doc.setFont("helvetica", "italic"); doc.setTextColor(90); const bl = doc.splitTextToSize(r.blurb, W); doc.text(bl, M, y); y += 13 * bl.length + 6; doc.setFont("helvetica", "normal"); doc.setTextColor(110); }
  y += 4;
  doc.setDrawColor(210); doc.line(M, y, M + W, y); y += 22;
  doc.setTextColor(30); doc.setFont("helvetica", "bold"); doc.setFontSize(13);
  doc.text("Ingredients", M, y); y += 18;
  doc.setFont("helvetica", "normal"); doc.setFontSize(11);
  r.ingredients.forEach((i) => {
    const line = "•  " + i.name + (i.have === false ? "   (to buy)" : "");
    const wrapped = doc.splitTextToSize(line, W);
    doc.text(wrapped, M, y); y += 15 * wrapped.length;
  });
  y += 12; doc.setFont("helvetica", "bold"); doc.setFontSize(13);
  doc.text("Method", M, y); y += 18;
  doc.setFont("helvetica", "normal"); doc.setFontSize(11);
  r.steps.forEach((s, idx) => {
    if (y > 760) { doc.addPage(); y = 64; }
    const wrapped = doc.splitTextToSize((idx + 1) + ".  " + s, W);
    doc.text(wrapped, M, y); y += 15 * wrapped.length + 4;
  });
  doc.setFontSize(8); doc.setTextColor(150);
  doc.text("Made with Larder · recipe developed in the style of the cited source", M, 812);
  doc.save(slug(r.title) + ".pdf");
}

/* ============================================================
   PERSISTENCE
   Uses Claude.ai's window.storage when present (artifact preview),
   otherwise falls back to localStorage (GitHub Pages / standalone),
   otherwise an in-memory object. Works in every environment.
   ============================================================ */
const HAS_WSTORAGE = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const memStore = {};
async function kvGet(key) {
  if (HAS_WSTORAGE) { try { const r = await window.storage.get(key, false); return r ? r.value : null; } catch (e) { return null; } }
  try { return typeof localStorage !== "undefined" ? localStorage.getItem(key) : (memStore[key] || null); } catch (e) { return memStore[key] || null; }
}
async function kvSet(key, val) {
  if (HAS_WSTORAGE) { try { await window.storage.set(key, val, false); } catch (e) {} return; }
  try { if (typeof localStorage !== "undefined") localStorage.setItem(key, val); else memStore[key] = val; } catch (e) { memStore[key] = val; }
}
async function kvDel(key) {
  if (HAS_WSTORAGE) { try { await window.storage.delete(key, false); } catch (e) {} return; }
  try { if (typeof localStorage !== "undefined") localStorage.removeItem(key); else delete memStore[key]; } catch (e) { delete memStore[key]; }
}
function parseJSON(v) { try { return v ? JSON.parse(v) : null; } catch (e) { return null; } }

async function savePantry(items) { await kvSet("larder:pantry", JSON.stringify(items)); }
async function loadPantry() { return parseJSON(await kvGet("larder:pantry")); }
async function saveResearched(items) { await kvSet("larder:researched", JSON.stringify(items)); }
async function loadResearched() { return parseJSON(await kvGet("larder:researched")); }
async function saveKeys(payload) { if (payload) await kvSet("larder:keys", JSON.stringify(payload)); else await kvDel("larder:keys"); }
async function loadKeys() { return parseJSON(await kvGet("larder:keys")); }
async function testApiKey(apiKey) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: anthropicHeaders(apiKey),
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 8, messages: [{ role: "user", content: "Reply with the single word: ok" }] }),
    });
    return res.ok;
  } catch (e) { return false; }
}
function maskKey(v) { return v && v.length > 12 ? v.slice(0, 7) + "…" + v.slice(-4) : "•••• " + (v || "").slice(-4); }
/* turn a generated AI recipe into a library-shaped record that the matcher
   can reuse: derive `key` foods (via the calorie parser) and `display` lines */
function toSavedRecipe(rec, diet) {
  return {
    id: rec.id, diet, title: rec.title, style: rec.style, servings: rec.servings, time: rec.time,
    key: rec.ingredients.map((i) => parseIngredient(i.name).food).filter(Boolean),
    display: rec.ingredients.map((i) => i.name),
    steps: rec.steps, researched: true, blurb: rec.blurb || "", flavor: rec.flavor || "",
  };
}

  const [loaded, setLoaded] = useState(false);

  useEffect(() => { (async () => {
    const p = await loadPantry(); if (p && Array.isArray(p)) setPantry(p);
    const r = await loadResearched(); if (r && Array.isArray(r)) setResearched(r);
    const k = await loadKeys(); if (k && k.remember) { setKeys(k.keys || []); setActiveKeyId(k.activeKeyId || null); setRememberKeys(true); }
    setLoaded(true);
  })(); }, []);
  useEffect(() => { if (loaded) savePantry(pantry); }, [pantry, loaded]);
  useEffect(() => { if (loaded) saveResearched(researched); }, [researched, loaded]);
  useEffect(() => { if (loaded) saveKeys(rememberKeys ? { keys, activeKeyId, remember: true } : null); }, [keys, activeKeyId, rememberKeys, loaded]);

  const toggleItem = (name) => setPantry((prev) => (prev.some((p) => normName(p) === normName(name)) ? prev.filter((p) => normName(p) !== normName(name)) : [...prev, normName(name)]));

        </div>

        {TABS.map((t) => (

            onClick={() => setTab(t.id)}>

      </nav>

      <main className="stage">
        {tab === "pantry"
          ? <Pantry pantry={pantry} addItem={addItem} removeItem={removeItem} toggleItem={toggleItem}
              apiKey={activeKey} onAddKey={addKey} onOpenKeyRing={() => setKeyRingOpen(true)} />
          : <RecipePanel key={tab} diet={tab} pantry={pantry} meta={TABS.find((t) => t.id === tab)}
              researched={researched} addResearched={addResearched} apiKey={activeKey}

      </main>

      {keyRingOpen && (
        <KeyRing keys={keys} activeKeyId={activeKeyId} rememberKeys={rememberKeys}

/* ---------- Shopping-list upload (photo / paste / file) ---------- */
function UploadModal({ onClose, addItem, apiKey }) {
  const [mode, setMode] = useState("paste");
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [added, setAdded] = useState(0);
  const fileRef = useRef(null);
  const photoRef = useRef(null);

  const commitList = (raw) => {
    const items = raw.split(/[\n,;]+/).map((s) => s.replace(/^[-*•\d.\s]+/, "").trim()).filter(Boolean);
    items.forEach(addItem); setAdded(items.length);
  };

  const handleFile = async (file) => {
    setErr(""); if (!file) return;
    try { const t = await file.text(); commitList(t); } catch (e) { setErr("Could not read that file."); }
  };

  const handlePhoto = async (file) => {
    setErr(""); if (!file) return; setBusy(true);
    try {
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader(); r.onload = () => res(String(r.result).split(",")[1]); r.onerror = rej; r.readAsDataURL(file);
      });
      const media = file.type || "image/jpeg";
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: anthropicHeaders(apiKey),
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: media, data: b64 } },
            { type: "text", text: "Read this shopping list. Respond with ONLY a JSON array of the grocery item names as lowercase strings, no quantities, no markdown." },
          ] }],
        }),
      });
      if (!resp.ok) throw new Error("vision");
      const data = await resp.json();
      const t = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
      let clean = t.replace(/```json/gi, "").replace(/```/g, "").trim();
      const s = clean.indexOf("["), e = clean.lastIndexOf("]");
      if (s !== -1 && e !== -1) clean = clean.slice(s, e + 1);
      const arr = JSON.parse(clean);
      arr.forEach((x) => addItem(String(x))); setAdded(arr.length);
    } catch (e) { setErr("Couldn't read the photo. Try pasting the list instead."); }
    setBusy(false);
  };

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <h3>Add a shopping list</h3>
          <button className="x-btn" onClick={onClose}>×</button>
        </div>
        <div className="seg">
          {[["paste", "Paste / type"], ["file", "File (txt/csv)"], ["photo", "Photo"]].map(([m, l]) => (
            <button key={m} className={"seg-btn" + (mode === m ? " on" : "")} onClick={() => { setMode(m); setErr(""); setAdded(0); }}>{l}</button>
          ))}
        </div>

        {mode === "paste" && (
          <div>
            <textarea className="paste-area" placeholder={"e.g.\nchickpeas\nspinach, garlic\nolive oil"} value={text} onChange={(e) => setText(e.target.value)} />
            <button className="btn-solid full" onClick={() => commitList(text)}>Add items</button>
          </div>
        )}
        {mode === "file" && (
          <div className="drop">
            <p>Upload a plain-text or CSV list — one item per line or comma-separated.</p>
            <input ref={fileRef} type="file" accept=".txt,.csv,text/plain,text/csv" hidden onChange={(e) => handleFile(e.target.files[0])} />
            <button className="btn-solid" onClick={() => fileRef.current && fileRef.current.click()}>Choose file</button>
          </div>
        )}
        {mode === "photo" && (
          <div className="drop">
            <p>Snap or upload a photo of a written or printed list — it's read automatically.</p>
            <input ref={photoRef} type="file" accept="image/*" hidden onChange={(e) => handlePhoto(e.target.files[0])} />
            <button className="btn-solid" disabled={busy} onClick={() => photoRef.current && photoRef.current.click()}>{busy ? "Reading…" : "Choose photo"}</button>
          </div>
        )}

        {err && <p className="err">{err}</p>}
        {added > 0 && <p className="ok">Added {added} item{added > 1 ? "s" : ""} to your pantry.</p>}
      </div>
    </div>
  );
}

/* ---------- Recipe panel (shared by the three diet tabs) ---------- */
const DIET_COPY = {
  vegan: { title: "Vegan recipes", note: "100% plant-based. No animal products — only plant substitutes." },
  vegetarian: { title: "Vegetarian recipes", note: "Plant-based plus cheese, yogurt and butter only. No eggs, milk, cream or meat." },
  omnivore: { title: "Meat & fish recipes", note: "Everything else — built around fish, red meat and lean proteins." },
};

function RecipePanel({ diet, pantry, meta, researched, addResearched, apiKey, onNeedKey }) {
  const accent = meta.accent;
  const [count, setCount] = useState(3);
  const [strict, setStrict] = useState(false);
  const [results, setResults] = useState([]);
  const [seen, setSeen] = useState(new Set());
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const [err, setErr] = useState("");
  const [touched, setTouched] = useState(false);
  const [researching, setResearching] = useState(false);
  const [researchMsg, setResearchMsg] = useState("");
  const [keyHint, setKeyHint] = useState(false);

  const savedForDiet = researched.filter((r) => r.diet === diet).length;

  const libraryPool = useMemo(
    () => [...LIBRARY, ...researched].filter((r) => r.diet === diet && recipeAllowedFor(diet, r.display)),
    [diet, researched]
  );

  const pickLibrary = (excludeIds, n) => {
    const eligible = libraryPool.filter((r) => {
      if (excludeIds.has(r.id)) return false;
      const miss = missingFor(r, pantry).length;
      return strict ? miss === 0 : miss <= 3;
    });
    // shuffle
    for (let i = eligible.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [eligible[i], eligible[j]] = [eligible[j], eligible[i]]; }
    return eligible.slice(0, n).map((r) => normalizeLibrary(r, pantry));
  };

  const fetchSet = async (fresh) => {
    setErr(""); setTouched(true); setLoading(true);
    const exclude = fresh ? new Set() : new Set(seen);
    const n = count;
    const fromLib = pickLibrary(exclude, n);
    fromLib.forEach((r) => exclude.add(r.id));
    let out = [...fromLib];
    const gap = n - out.length;

    if (gap > 0 && pantry.length > 0) {
      setStatus(`Library found ${out.length}. Asking Claude for ${gap} more…`);
      const avoid = [...out.map((r) => r.title)];
      try {
        const calls = Array.from({ length: gap }).map(() =>
          generateOneRecipe({ diet, pantry, strict, avoid, apiKey }).catch(() => null));
        const ai = (await Promise.all(calls)).filter(Boolean);
        ai.forEach((r) => { out.push(r); exclude.add(r.id); });
      } catch (e) { setErr("The recipe service is unavailable right now — showing library matches only."); }
    }
    setStatus("");
    if (out.length === 0) setErr(pantry.length === 0 ? "Add a few pantry items first." : "No matches — try Flexible mode or add more items.");
    setResults(out);
    setSeen((prev) => { const s = new Set(prev); out.forEach((r) => s.add(r.id)); return s; });
    setLoading(false);
  };

  const copy = DIET_COPY[diet];

  const runResearch = async () => {
    if (pantry.length === 0) { setErr("Add pantry items first — Research builds recipes around what you have."); return; }
    setErr(""); setResearchMsg(""); setKeyHint(false); setResearching(true);
    setStatus(`Chef Boye R. Dee is researching ${count} new ${copy.title.toLowerCase()}…`);
    const existing = [...LIBRARY, ...researched].filter((r) => r.diet === diet).map((r) => r.title).concat(results.map((r) => r.title));
    const lowerExisting = new Set(existing.map((t) => t.toLowerCase()));
    try {
      const calls = Array.from({ length: count }).map(() =>
        generateOneRecipe({ diet, pantry, strict, avoid: existing, apiKey }).catch(() => null));
      const ai = (await Promise.all(calls)).filter(Boolean).filter((r) => !lowerExisting.has((r.title || "").toLowerCase()));
      setStatus("");
      if (ai.length === 0) {
        setErr("Couldn't develop new recipes just now — please try again.");
        setKeyHint(!apiKey);
        setResearching(false); return;
      }
      const saved = ai.map((r) => toSavedRecipe(r, diet));
      addResearched(saved);                                   // persist to memory alongside the rest
      const normalized = saved.map((r) => normalizeLibrary(r, pantry));
      setResults(normalized); setTouched(true);
      setSeen((prev) => { const s = new Set(prev); normalized.forEach((r) => s.add(r.id)); return s; });
      setResearchMsg(`Chef Boye R. Dee cooked up and saved ${ai.length} recipe${ai.length > 1 ? "s" : ""} to your cookbook — they'll show up in future searches too.`);
    } catch (e) { setStatus(""); setErr("The recipe service is unavailable right now."); setKeyHint(!apiKey); }
    setResearching(false);
  };

  return (
    <section className="panel" style={{ "--tab-accent": accent, "--on-accent": meta.onAccent, "--accent-ink": meta.ink }}>
      <div className="panel-head">
        <div>
          <h2>{copy.title}</h2>
          <p className="sub">{copy.note}</p>
        </div>
      </div>

      <div className="controls">
        <div className="ctrl">
          <span className="ctrl-label">How many</span>
          <div className="seg small">
            {[1, 3, 5].map((n) => (
              <button key={n} className={"seg-btn" + (count === n ? " on" : "")} onClick={() => setCount(n)}>{n}</button>
            ))}
          </div>
        </div>
        <div className="ctrl">
          <span className="ctrl-label">Ingredients</span>
          <button className={"toggle" + (strict ? " strict" : "")} onClick={() => setStrict((s) => !s)}>
            <span className={!strict ? "on" : ""}>Flexible</span>
            <span className={strict ? "on" : ""}>Strict</span>
          </button>
          <span className="hint">{strict ? "only what you have" : "up to 3 missing"}</span>
        </div>
        <div className="ctrl grow">
          <button className="btn-solid" disabled={loading} onClick={() => fetchSet(true)}>
            {loading ? "Finding…" : results.length ? "Find new set" : "Find recipes"}
          </button>
          {results.length > 0 && (
            <button className="btn-ghost" disabled={loading} onClick={() => fetchSet(false)}>Reshuffle</button>
          )}
        </div>
      </div>

      <div className="research-row">
        <button className="btn-research" disabled={researching || loading} onClick={runResearch}>
          {researching ? "Chef is cooking…" : "Ask Chef Boye R. Dee"}
        </button>
        <span className="research-note">
          The Chef researches {count} new recipe{count > 1 ? "s" : ""} from your pantry and saves {count > 1 ? "them" : "it"} to your cookbook
          {savedForDiet > 0 ? ` · ${savedForDiet} saved so far` : ""}
        </span>
      </div>

      {status && <p className="status">{status}</p>}
      {researchMsg && <p className="ok">{researchMsg}</p>}
      {err && <p className="err">{err}{keyHint && <> Running outside Claude? <button className="link-btn" onClick={onNeedKey}>Add your Anthropic API key</button> to enable the AI researcher.</>}</p>}

      {!touched && pantry.length === 0 && (
        <div className="empty">Your pantry is empty. Add items in the Pantry tab, then find recipes here.</div>
      )}

      <div className="cards">
        {results.map((r) => <RecipeCard key={r.id} r={r} accent={accent} />)}
      </div>
    </section>
  );
}

function RecipeCard({ r }) {
  const [open, setOpen] = useState(false);
  return (
    <article className="card">
      <div className="spine" />
      <div className="card-body">
        <div className="card-top">
          <div>
            <h3>{r.title}</h3>
            <div className="meta">
              <span className="tag">{r.source === "AI" ? "Chef" : r.source === "Saved" ? "Saved" : "Library"}</span>
              <span className="kcal">≈ {r.kcal} kcal/serving</span>
              {r.flavor && <span className="flavor">{r.flavor}</span>}
              <span>in the style of {r.style}</span>
              <span>· {r.servings} servings · {r.time} min</span>
            </div>
          </div>
          <button className="pdf-btn" onClick={() => downloadPdf(r)} title="Download PDF">PDF ↓</button>
        </div>

        {r.blurb && (
          <p className="chef-blurb"><span className="chef-name">Chef Boye R. Dee</span>{r.blurb}</p>
        )}

        {r.missing && r.missing.length > 0 && (
          <div className="tobuy">To buy: {r.missing.map((m) => <span key={m} className="buy-chip">{m}</span>)}</div>
        )}

        <button className="reveal" onClick={() => setOpen((o) => !o)}>{open ? "Hide recipe" : "Show recipe"}</button>

        {open && (
          <div className="recipe">
            <div className="rcol">
              <h4>Ingredients</h4>
              <ul>{r.ingredients.map((i, idx) => (
                <li key={idx} className={i.have === false ? "miss" : ""}>{i.name}{i.have === false ? " (to buy)" : ""}</li>
              ))}</ul>
            </div>
            <div className="rcol">
              <h4>Method</h4>
              <ol>{r.steps.map((s, idx) => <li key={idx}>{s}</li>)}</ol>
              <p className="cal-note">≈ {r.kcal} kcal per serving · {r.kcalTotal} kcal total. Approximate, estimated from ingredient amounts{r.kcalCoverage < 0.8 ? " (partial — some items not in the food table)" : ""}.</p>
            </div>
          </div>
        )}
      </div>
    </article>
  );
}

/* ---------- API key ring ---------- */
function KeyRing({ keys, activeKeyId, rememberKeys, onAdd, onRemove, onActivate, onToggleRemember, onClose }) {
  const [label, setLabel] = useState("");
  const [val, setVal] = useState("");
  const [note, setNote] = useState("");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState("");

  const add = () => {
    const v = val.trim();
    if (!v) { setNote("Paste a key first."); return; }
    setNote(v.startsWith("sk-ant-") ? "" : "That doesn't look like an Anthropic key (they start with sk-ant-) — added anyway.");
    onAdd(label.trim(), v); setLabel(""); setVal("");
  };
  const runTest = async () => {
    const active = keys.find((k) => k.id === activeKeyId);
    if (!active) { setTestResult("pick"); return; }
    setTesting(true); setTestResult("");
    const ok = await testApiKey(active.value);
    setTesting(false); setTestResult(ok ? "ok" : "fail");
  };

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <h3>API key ring</h3>
          <button className="x-btn" onClick={onClose}>×</button>
        </div>

        <p className="keyring-intro">
          The AI researcher and photo list-reader run on Claude. <strong>Inside Claude.ai you don't need a key</strong> — it's already connected. Add a key only if you run Larder on your own (self-hosted or opened as a file).
        </p>
        <p className="keyring-warn">
          A key typed into a web page is visible in that browser — use your own key for personal use, and never publish a hosted copy with a shared key. Keys are created at console.anthropic.com.
        </p>

        <div className="key-add">
          <input className="add-input" placeholder="Label (optional)" value={label} onChange={(e) => setLabel(e.target.value)} />
          <input className="add-input" type="password" placeholder="sk-ant-…" value={val}
            onChange={(e) => setVal(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") add(); }} />
          <button className="btn-solid" onClick={add}>Add key</button>
        </div>
        {note && <p className="hint" style={{ marginTop: 6 }}>{note}</p>}

        {keys.length > 0 ? (
          <div className="key-list">
            {keys.map((k) => (
              <div key={k.id} className={"key-item" + (k.id === activeKeyId ? " on" : "")}>
                <label className="key-pick">
                  <input type="radio" name="activekey" checked={k.id === activeKeyId} onChange={() => onActivate(k.id)} />
                  <span className="key-label">{k.label}</span>
                  <span className="key-mask">{maskKey(k.value)}</span>
                </label>
                <button className="key-remove" onClick={() => onRemove(k.id)}>Remove</button>
              </div>
            ))}
          </div>
        ) : <p className="hint" style={{ margin: "12px 0" }}>No keys added — not needed inside Claude.ai.</p>}

        {keys.length > 0 && (
          <div className="key-actions">
            <button className="btn-ghost" disabled={testing} onClick={runTest}>{testing ? "Testing…" : "Test active key"}</button>
            {testResult === "ok" && <span className="ok" style={{ margin: 0 }}>Key works.</span>}
            {testResult === "fail" && <span className="err" style={{ margin: 0 }}>Key failed — check it's valid and has credit.</span>}
            {testResult === "pick" && <span className="hint">Select a key to test.</span>}
          </div>
        )}

        <label className="remember-row">
          <input type="checkbox" checked={rememberKeys} onChange={onToggleRemember} />
          <span>Remember on this device <span className="hint">— stores keys in this app's local storage; off by default for safety.</span></span>
        </label>
      </div>
    </div>
  );
}

/* ---------- Sources ---------- */
function SourcesFooter() {
  const plant = SOURCES.filter((s) => s.kind === "plant");
  const uni = SOURCES.filter((s) => s.kind === "universal");
  return (
    <footer className="sources">
      <h2>Sources</h2>
      <p className="src-note">Recipes are original formulations developed <em>in the style of</em> these trusted kitchens — the culinary references Larder draws on. Tap any name to visit the source.</p>
      <div className="src-grid">
        <div>
          <div className="src-head">Vegan &amp; vegetarian ({plant.length})</div>
          <div className="src-list">{plant.map((s) => <a key={s.name} href={s.url} target="_blank" rel="noopener noreferrer">{s.name}</a>)}</div>
        </div>
        <div>
          <div className="src-head">Universal ({uni.length})</div>
          <div className="src-list">{uni.map((s) => <a key={s.name} href={s.url} target="_blank" rel="noopener noreferrer">{s.name}</a>)}</div>
        </div>
      </div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
